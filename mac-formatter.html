<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAC 地址格式化工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E2DFD8;
    --border-focus: #5A5A5A;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6867;
    --text-hint: #A09D99;
    --accent: #1A1A1A;
    --accent-fg: #FFFFFF;
    --success-bg: #EAF3DE;
    --success-text: #3B6D11;
    --error-bg: #FEF2F2;
    --error-border: #FECACA;
    --error-text: #991B1B;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  /* ── header ── */
  header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 40px;
  }
  .eyebrow {
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -.5px;
    line-height: 1.2;
  }
  .subtitle {
    margin-top: 8px;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* ── card ── */
  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 28px 24px;
  }

  /* ── form elements ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .05em;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  input[type="text"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text-primary);
    outline: none;
    transition: border-color .15s;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--border-focus);
    background: var(--surface);
  }
  input[type="text"] { height: 38px; resize: none; }

  .row-2 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .field { margin-bottom: 20px; }

  textarea#macInput { min-height: 160px; }
  textarea#output   { min-height: 140px; background: var(--surface2); }

  /* ── buttons ── */
  .btn-row {
    display: flex;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--sans);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .08s;
  }
  button:active { transform: scale(.97); }

  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #333; border-color: #333; }

  .btn-ghost {
    background: var(--surface);
    color: var(--text-primary);
  }
  .btn-ghost:hover { background: var(--surface2); }

  .btn-danger {
    background: var(--surface);
    color: var(--error-text);
    border-color: var(--error-border);
  }
  .btn-danger:hover { background: var(--error-bg); }

  /* ── divider ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* ── stat row ── */
  .stat-row {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--text-secondary);
    align-items: center;
  }
  .stat-num {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .stat-ok  .stat-num { color: #3B6D11; }
  .stat-err .stat-num { color: #991B1B; }

  /* ── error list ── */
  .error-box {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--error-text);
    line-height: 1.7;
    font-family: var(--mono);
    display: none;
  }

  /* ── output section label ── */
  .output-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  /* ── toast ── */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1A1A1A;
    color: #fff;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── responsive ── */
  @media (max-width: 500px) {
    .row-2 { grid-template-columns: 1fr; }
    .card { padding: 20px 16px; }
    h1 { font-size: 22px; }
    .btn-row { flex-direction: column; }
    button { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">内部工具</p>
  <h1>MAC 地址格式化</h1>
  <p class="subtitle">粘贴无冒号的 MAC 地址，自动补全格式，生成可直接导入后台的三列数据。</p>
</header>

<div class="card">

  <!-- 配置行 -->
  <div class="row-2">
    <div>
      <label for="pkg">包名</label>
      <input type="text" id="pkg" value="com.qcode.tvvoicehelp" placeholder="com.example.app" />
    </div>
    <div>
      <label for="channel">渠道号</label>
      <input type="text" id="channel" value="387" placeholder="387" />
    </div>
  </div>

  <!-- 输入 -->
  <div class="field">
    <label for="macInput">MAC 地址列表（每行一个，支持无冒号 / 有冒号 / 有横杠格式）</label>
    <textarea id="macInput" placeholder="40E79345AEEE&#10;40E79345AEEF&#10;40E79345AEF0&#10;…"></textarea>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="process()">转换</button>
    <button class="btn-ghost" onclick="loadSample()">加载示例</button>
    <button class="btn-danger" onclick="clearAll()">清空</button>
  </div>

  <!-- 结果区 -->
  <hr class="divider" id="resultSection" style="display:none;" />

  <div id="statsRow" class="stat-row" style="display:none;">
    <span class="stat-ok"><span class="stat-num" id="okCount">0</span> 条成功</span>
    <span class="stat-err"><span class="stat-num" id="errCount">0</span> 条跳过</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="outputArea" style="display:none;">
    <div class="output-label-row">
      <label for="output" style="margin-bottom:0;">结果（Tab 分隔，可直接粘贴进 Excel）</label>
      <button class="btn-ghost" onclick="copyResult()" style="padding:5px 12px; font-size:12px;">复制全部</button>
    </div>
    <textarea id="output" readonly></textarea>
  </div>

</div>

<div id="toast">已复制到剪贴板 ✓</div>

<script>
function formatMAC(raw) {
  const cleaned = raw.replace(/[:\-\s]/g, '').toUpperCase();
  if (cleaned.length !== 12 || !/^[0-9A-F]{12}$/.test(cleaned)) return null;
  return cleaned.match(/.{2}/g).join(':');
}

function process() {
  const pkg     = document.getElementById('pkg').value.trim();
  const channel = document.getElementById('channel').value.trim();
  const raw     = document.getElementById('macInput').value.trim();

  if (!raw) { showToast('请先输入 MAC 地址'); return; }
  if (!pkg || !channel) { showToast('包名和渠道号不能为空'); return; }

  const lines  = raw.split('\n');
  const errors = [];
  const results = [];

  lines.forEach((line, i) => {
    const v = line.trim();
    if (!v) return;
    const mac = formatMAC(v);
    if (!mac) errors.push(`第 ${i + 1} 行：${v}`);
    else       results.push(`${pkg}\t${channel}\t${mac}`);
  });

  document.getElementById('resultSection').style.display = '';
  document.getElementById('statsRow').style.display      = '';
  document.getElementById('okCount').textContent  = results.length;
  document.getElementById('errCount').textContent = errors.length;

  const errBox = document.getElementById('errorBox');
  if (errors.length) {
    errBox.style.display = 'block';
    errBox.innerHTML = '<strong>无法识别的行（已跳过）：</strong><br>' + errors.join('<br>');
  } else {
    errBox.style.display = 'none';
  }

  const outputArea = document.getElementById('outputArea');
  outputArea.style.display = results.length ? '' : 'none';
  document.getElementById('output').value = results.join('\n');
}

function copyResult() {
  const val = document.getElementById('output').value;
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => showToast('已复制到剪贴板 ✓'));
}

function clearAll() {
  document.getElementById('macInput').value = '';
  document.getElementById('output').value   = '';
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('statsRow').style.display      = 'none';
  document.getElementById('outputArea').style.display    = 'none';
  document.getElementById('errorBox').style.display      = 'none';
}

function loadSample() {
  document.getElementById('macInput').value =
    '40E79345AEEE\n40E79345AEEF\n40E79345AEF0\n40E79345AEF1\n40E79345AEF2\nINVALID_MAC\n40E79345AEF3';
  document.getElementById('pkg').value     = 'com.qcode.tvvoicehelp';
  document.getElementById('channel').value = '387';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
